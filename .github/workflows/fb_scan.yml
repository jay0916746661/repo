name: FB Marketplace 撿漏自動掃描

on:
  schedule:
    - cron: '*/30 * * * *'   # 每 30 分鐘執行
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout 代碼
        uses: actions/checkout@v4

      - name: 設定 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安裝套件
        run: pip install playwright requests

      - name: 安裝 Playwright 瀏覽器
        run: playwright install chromium --with-deps

      - name: 注入 FB Cookies（env → fb_cookies.json）
        env:
          FB_COOKIES: ${{ secrets.FB_COOKIES }}
        run: |
          if [ -n "$FB_COOKIES" ]; then
            echo "$FB_COOKIES" > fb_cookies.json
            echo "✅ FB cookies 已載入（$(wc -c < fb_cookies.json) bytes）"
          else
            echo "⚠️  FB_COOKIES secret 尚未設定，以訪客模式執行（結果可能為空）"
          fi

      - name: 執行撿漏爬蟲
        env:
          LINE_NOTIFY_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }}
        run: python fb_scraper.py

      - name: 清除 Cookies 暫存
        if: always()
        run: rm -f fb_cookies.json

      - name: Commit 掃描結果
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deals.json
          if git diff --staged --quiet; then
            echo "deals.json 無變動，跳過 commit"
          else
            git commit -m "chore: deals.json $(date +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
