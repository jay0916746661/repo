<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Jim 書庫 · 電子書雜誌</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
/* ========== magazine.css ========== */
:root {
  --bg: #F3EDE0;
  --bg-alt: #EAE2D1;
  --ink: #1A1815;
  --ink-soft: #4A453E;
  --ink-mute: #8B8378;
  --accent: #7A2E2B;
  --line: rgba(26, 24, 21, 0.14);
  --line-strong: rgba(26, 24, 21, 0.4);
  --serif: "Instrument Serif", "Noto Serif TC", Georgia, serif;
  --sans: "Noto Sans TC", "PingFang TC", "Inter", "Helvetica Neue", sans-serif;
  --display: "Noto Sans TC", "PingFang TC", "Inter", sans-serif;
  --mono: "JetBrains Mono", "SF Mono", "Courier New", monospace;
}
[data-theme="classical"] { --bg: #EDE4D0; --bg-alt: #DCCFB0; --ink: #221A10; --accent: #6B2020; }
[data-theme="minimal"] { --bg: #FAFAF7; --bg-alt: #F0EFEA; --ink: #0A0A08; --ink-soft: #3A3A36; --accent: #1A1A18; --line: rgba(0,0,0,0.08); }
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--bg); color: var(--ink); font-family: var(--sans); font-size: 15px; line-height: 1.6; font-weight: 400; -webkit-font-smoothing: antialiased; }
#root { min-height: 100vh; }
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
.app-shell { min-height: 100vh; position: relative; }

/* ── 封面頁 ── */
.cover-page { min-height: 100vh; padding: 40px 60px 60px; position: relative; overflow: hidden; }
.cover-grid { max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: 1fr 320px; grid-template-rows: auto 1fr auto; gap: 40px; min-height: calc(100vh - 100px); }
.cover-header { grid-column: 1 / -1; display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 3px double var(--ink); padding-bottom: 20px; }
.cover-masthead { display: flex; align-items: center; gap: 16px; }
.masthead-mark { font-size: 42px; color: var(--accent); line-height: 1; }
.masthead-title { font-family: var(--display); font-size: 42px; font-weight: 900; line-height: 1; letter-spacing: 0.08em; }
.masthead-en { font-family: var(--sans); font-size: 11px; letter-spacing: 0.3em; color: var(--ink-soft); margin-top: 4px; }
.cover-meta { display: flex; gap: 24px; font-family: var(--sans); font-size: 12px; color: var(--ink-soft); }
.cover-meta .label { font-weight: 700; color: var(--ink); margin-right: 4px; }
.cover-main { display: flex; flex-direction: column; justify-content: space-between; padding-right: 40px; border-right: 1px solid var(--line); position: relative; }
.cover-issue-number { position: absolute; top: -20px; right: 0; font-family: var(--serif); font-size: 280px; line-height: 1; color: var(--accent); opacity: 0.08; font-weight: 900; pointer-events: none; }
.cover-kicker { font-family: var(--sans); font-size: 11px; letter-spacing: 0.3em; color: var(--accent); margin-bottom: 24px; font-weight: 600; }
.cover-title { font-family: var(--display); font-size: 88px; line-height: 1.02; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 28px; }
.cover-title em { font-family: var(--serif); font-style: italic; color: var(--accent); font-weight: 400; letter-spacing: -0.01em; }
.cover-sub { font-family: var(--sans); font-size: 15px; color: var(--ink-soft); border-top: 1px solid var(--line); padding-top: 16px; max-width: 520px; letter-spacing: 0.02em; }
.cover-feature-card { margin-top: 40px; padding: 28px 32px; background: var(--ink); color: var(--bg); border-radius: 2px; max-width: 440px; cursor: pointer; transition: transform 0.2s; }
.cover-feature-card:hover { transform: translateY(-3px); }
.feature-label { font-family: var(--sans); font-size: 10px; letter-spacing: 0.3em; color: var(--accent); margin-bottom: 10px; }
.feature-title { font-family: var(--display); font-size: 26px; font-weight: 700; line-height: 1.2; margin-bottom: 4px; letter-spacing: -0.02em; }
.feature-author { font-family: var(--sans); font-size: 12px; letter-spacing: 0.15em; opacity: 0.7; margin-bottom: 12px; }
.feature-desc { font-size: 14px; line-height: 1.55; opacity: 0.85; margin-bottom: 16px; }
.feature-cta { font-family: var(--sans); font-size: 11px; letter-spacing: 0.2em; color: var(--accent); font-weight: 600; }
.cover-index { padding: 28px 0 0 32px; border-left: 1px solid var(--line); margin-left: -40px; font-family: var(--sans); }
.index-title { font-family: var(--display); font-size: 18px; font-weight: 700; border-bottom: 2px solid var(--ink); padding-bottom: 10px; margin-bottom: 20px; letter-spacing: 0.02em; }
.index-list { list-style: none; margin-bottom: 32px; }
.index-list li { display: grid; grid-template-columns: 28px 1fr auto auto; gap: 6px; align-items: baseline; padding: 10px 0; border-bottom: 1px dotted var(--line-strong); cursor: pointer; transition: all 0.15s; font-size: 13px; }
.index-list li:hover { color: var(--accent); padding-left: 4px; }
.idx-num { font-family: var(--mono); font-size: 11px; color: var(--ink-mute); }
.idx-title { font-family: var(--sans); font-size: 14px; font-weight: 500; letter-spacing: 0.01em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 140px; }
.idx-dots { border-bottom: 1px dotted var(--ink-mute); margin: 0 6px 4px; min-width: 10px; flex: 1; }
.idx-page { font-family: var(--mono); font-size: 11px; color: var(--ink-mute); }
.index-foot { font-family: var(--sans); font-size: 11px; color: var(--ink-soft); line-height: 2; padding-top: 16px; border-top: 1px solid var(--line); }
.cover-footer { grid-column: 1 / -1; display: flex; justify-content: space-between; align-items: center; padding-top: 24px; border-top: 1px solid var(--line); }
.footer-tags { display: flex; gap: 14px; font-family: var(--sans); font-size: 11px; color: var(--ink-soft); letter-spacing: 0.08em; flex-wrap: wrap; }
.enter-btn { font-family: var(--sans); font-size: 12px; letter-spacing: 0.2em; padding: 14px 28px; background: var(--ink); color: var(--bg); border-radius: 999px; font-weight: 600; transition: all 0.2s; white-space: nowrap; }
.enter-btn:hover { background: var(--accent); }
.enter-btn .arrow { display: inline-block; transition: transform 0.2s; margin-left: 8px; }
.enter-btn:hover .arrow { transform: translateX(4px); }

/* ── 書架頁 ── */
.bookshelf-page { min-height: 100vh; padding: 80px 60px 60px; }
.shelf-header { max-width: 1400px; margin: 0 auto 60px; position: relative; border-bottom: 1px solid var(--line); padding-bottom: 32px; }
.shelf-back { font-family: var(--sans); font-size: 12px; letter-spacing: 0.15em; color: var(--ink-soft); margin-bottom: 24px; display: block; transition: color 0.2s; }
.shelf-back:hover { color: var(--accent); }
.shelf-title-block { margin-bottom: 28px; }
.shelf-kicker { font-family: var(--sans); font-size: 11px; letter-spacing: 0.3em; color: var(--accent); font-weight: 600; margin-bottom: 12px; }
.shelf-title { font-family: var(--display); font-size: 68px; font-weight: 800; line-height: 1; margin-bottom: 12px; letter-spacing: -0.035em; }
.shelf-sub { font-family: var(--sans); font-size: 14px; color: var(--ink-soft); letter-spacing: 0.02em; }
.shelf-toolbar { display: flex; justify-content: space-between; align-items: center; gap: 20px; flex-wrap: wrap; }
.shelf-filters { display: flex; gap: 8px; flex-wrap: wrap; }
.filter-chip { font-family: var(--sans); font-size: 12px; letter-spacing: 0.08em; padding: 8px 16px; border: 1px solid var(--line-strong); border-radius: 999px; color: var(--ink-soft); transition: all 0.15s; }
.filter-chip:hover { border-color: var(--ink); color: var(--ink); }
.filter-chip.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }
.shelf-add { font-family: var(--sans); font-size: 12px; letter-spacing: 0.1em; padding: 10px 18px; background: var(--ink); color: var(--bg); border-radius: 999px; font-weight: 600; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px; white-space: nowrap; }
.shelf-add:hover { background: var(--accent); }
.add-plus { font-size: 16px; line-height: 1; font-weight: 300; }
.shelf-grid { max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 40px 48px; }
.book-card { display: grid; grid-template-columns: 160px 1fr; gap: 20px; cursor: pointer; padding: 20px 0; border-top: 1px solid var(--line); transition: all 0.25s; position: relative; }
.book-card:hover { transform: translateY(-2px); }
.book-card:hover .card-title { color: var(--accent); }
.card-cover { aspect-ratio: 2 / 3; position: relative; overflow: hidden; transition: transform 0.3s; box-shadow: 0 12px 28px rgba(0,0,0,0.18), 0 2px 8px rgba(0,0,0,0.12); }
.book-card:hover .card-cover { transform: translateY(-4px) rotate(-0.5deg); box-shadow: 0 20px 40px rgba(0,0,0,0.24); }
.card-meta { display: flex; flex-direction: column; overflow: hidden; }
.card-issue { font-family: var(--sans); font-size: 10px; letter-spacing: 0.25em; color: var(--accent); font-weight: 700; margin-bottom: 10px; }
.card-title { font-family: var(--display); font-size: 22px; font-weight: 700; line-height: 1.2; margin-bottom: 6px; transition: color 0.2s; letter-spacing: -0.02em; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
.card-sub { font-family: var(--sans); font-size: 12px; color: var(--ink-soft); margin-bottom: 10px; letter-spacing: 0.01em; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
.card-author-row { display: flex; justify-content: space-between; font-family: var(--sans); font-size: 12px; padding-bottom: 10px; border-bottom: 1px solid var(--line); margin-bottom: 10px; }
.card-author { font-weight: 600; }
.card-year { color: var(--ink-mute); font-family: var(--mono); }
.card-summary { font-family: var(--sans); font-size: 12px; line-height: 1.65; color: var(--ink-soft); margin-bottom: 12px; flex: 1; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; }
.card-tags { display: flex; gap: 6px; flex-wrap: wrap; font-family: var(--sans); font-size: 10px; color: var(--ink-mute); letter-spacing: 0.05em; margin-bottom: 10px; }
.card-footer { display: flex; justify-content: space-between; font-family: var(--sans); font-size: 11px; letter-spacing: 0.1em; color: var(--ink-mute); padding-top: 10px; border-top: 1px dotted var(--line-strong); }
.card-cta { color: var(--accent); font-weight: 700; }
.card-del { position: absolute; top: 28px; right: 4px; width: 24px; height: 24px; border-radius: 50%; background: rgba(0,0,0,0.4); color: white; font-size: 16px; line-height: 24px; text-align: center; opacity: 0; transition: all 0.15s; z-index: 5; }
.book-card:hover .card-del { opacity: 1; }
.card-del:hover { background: var(--accent); }
.shelf-add-card { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; border: 2px dashed var(--line-strong); background: transparent; cursor: pointer; transition: all 0.2s; font-family: var(--sans); min-height: 200px; }
.shelf-add-card:hover { border-color: var(--ink); background: var(--bg-alt); }
.add-card-icon { font-size: 42px; color: var(--ink-mute); margin-bottom: 14px; font-weight: 300; }
.add-card-title { font-family: var(--display); font-size: 18px; font-weight: 700; margin-bottom: 8px; color: var(--ink); letter-spacing: -0.01em; }
.add-card-sub { font-size: 11px; color: var(--ink-mute); letter-spacing: 0.05em; line-height: 1.6; text-align: center; }
.shelf-footer { max-width: 1400px; margin: 80px auto 0; padding-top: 32px; border-top: 3px double var(--ink); display: flex; justify-content: space-between; font-family: var(--sans); font-size: 11px; letter-spacing: 0.15em; color: var(--ink-soft); }

/* ── 書封設計 ── */
.cover-art { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: space-between; padding: 16px 14px; color: rgba(255,255,255,0.95); font-family: var(--serif); text-align: center; }
.cover-art::before { content: ""; position: absolute; inset: 8px; border: 1px solid rgba(255,255,255,0.3); pointer-events: none; }
.art-issue { font-family: var(--mono); font-size: 9px; letter-spacing: 0.3em; opacity: 0.8; }
.art-title-zh { font-size: 28px; font-weight: 900; line-height: 1.05; letter-spacing: 0.08em; writing-mode: vertical-rl; margin: auto; text-align: center; overflow: hidden; max-height: 85%; }
.art-author { font-family: var(--sans); font-size: 10px; letter-spacing: 0.15em; opacity: 0.85; }
.art-year { font-family: var(--mono); font-size: 9px; letter-spacing: 0.2em; opacity: 0.6; }
.art-deco { position: absolute; width: 30px; height: 30px; border: 1px solid rgba(255,255,255,0.4); top: 20px; right: 20px; transform: rotate(45deg); opacity: 0.5; }
.cover-art-image { padding: 0; }
.cover-art-image::before { display: none; }
.cover-art-img { width: 100%; height: 100%; object-fit: cover; display: block; }

/* ── 詳情頁 ── */
.detail-page { min-height: 100vh; padding: 80px 60px 60px; }
.detail-header { max-width: 1200px; margin: 0 auto 48px; display: grid; grid-template-columns: auto 1fr auto; gap: 24px; align-items: center; padding-bottom: 20px; border-bottom: 1px solid var(--line); font-family: var(--sans); font-size: 12px; letter-spacing: 0.12em; }
.detail-back { color: var(--ink-soft); transition: color 0.2s; }
.detail-back:hover { color: var(--accent); }
.detail-crumb { color: var(--ink-mute); overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
.detail-issue { color: var(--accent); font-weight: 700; white-space: nowrap; }
.detail-hero { max-width: 1200px; margin: 0 auto 80px; display: grid; grid-template-columns: 280px 1fr; gap: 60px; align-items: start; }
.hero-cover { aspect-ratio: 2 / 3; position: relative; box-shadow: 0 24px 60px rgba(0,0,0,0.2), 0 4px 12px rgba(0,0,0,0.1); }
.hero-cover .cover-art { padding: 36px 32px; }
.hero-cover .art-title-zh { font-size: 52px; letter-spacing: 0.2em; }
.hero-cover .art-author { font-size: 14px; }
.hero-cover .art-issue, .hero-cover .art-year { font-size: 12px; }
.hero-cover .art-deco { width: 50px; height: 50px; top: 32px; right: 32px; }
.hero-info { padding-top: 8px; }
.hero-category { font-family: var(--sans); font-size: 11px; letter-spacing: 0.3em; color: var(--accent); font-weight: 700; margin-bottom: 16px; }
.hero-title { font-family: var(--display); font-size: 56px; font-weight: 800; line-height: 1.05; letter-spacing: -0.03em; margin-bottom: 14px; }
.hero-subtitle { font-family: var(--sans); font-size: 17px; color: var(--ink-soft); margin-bottom: 20px; font-weight: 400; }
.hero-byline { font-family: var(--sans); font-size: 13px; color: var(--ink-soft); margin-bottom: 28px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.byline-author { font-weight: 700; color: var(--ink); }
.byline-sep { color: var(--ink-mute); }
.hero-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; padding: 20px 0; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); margin-bottom: 24px; }
.hero-stats > div { text-align: center; padding: 0 16px; border-right: 1px solid var(--line); }
.hero-stats > div:last-child { border-right: none; }
.stat-num { font-family: var(--display); font-size: 28px; font-weight: 700; line-height: 1; letter-spacing: -0.02em; }
.stat-lbl { font-family: var(--sans); font-size: 10px; letter-spacing: 0.2em; color: var(--ink-mute); margin-top: 6px; }
.hero-actions { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
.btn-primary, .btn-ghost { font-family: var(--sans); font-size: 12px; letter-spacing: 0.15em; padding: 12px 24px; border-radius: 2px; font-weight: 600; transition: all 0.15s; }
.btn-primary { background: var(--ink); color: var(--bg); }
.btn-primary:hover { background: var(--accent); }
.btn-ghost { border: 1px solid var(--line-strong); color: var(--ink-soft); }
.btn-ghost:hover { border-color: var(--ink); color: var(--ink); }
.hero-tags { display: flex; gap: 8px; flex-wrap: wrap; }
.hero-tag { font-family: var(--sans); font-size: 11px; padding: 4px 10px; background: var(--bg-alt); border-radius: 2px; letter-spacing: 0.05em; }
.detail-lead { max-width: 820px; margin: 0 auto 72px; padding: 40px 60px; border-top: 3px double var(--ink); border-bottom: 3px double var(--ink); text-align: center; }
.lead-label { font-family: var(--sans); font-size: 11px; letter-spacing: 0.3em; color: var(--accent); font-weight: 700; margin-bottom: 20px; }
.lead-text { font-family: var(--sans); font-size: 16px; line-height: 1.8; color: var(--ink); font-weight: 400; letter-spacing: 0.005em; text-align: left; }
.lead-sig { font-family: var(--serif); font-style: italic; color: var(--ink-soft); margin-top: 20px; font-size: 14px; }
.detail-tabs { max-width: 1000px; margin: 0 auto 32px; display: flex; justify-content: center; gap: 0; border-bottom: 1px solid var(--line); }
.tab-btn { font-family: var(--sans); font-size: 13px; letter-spacing: 0.15em; padding: 14px 32px; color: var(--ink-mute); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; }
.tab-btn:hover { color: var(--ink); }
.tab-btn.active { color: var(--ink); border-bottom-color: var(--accent); font-weight: 700; }
.detail-body { max-width: 1000px; margin: 0 auto 80px; }
.chapter-item { border-bottom: 1px solid var(--line); cursor: pointer; transition: background 0.2s; }
.chapter-item:first-child { border-top: 1px solid var(--line); }
.chapter-item.open { background: var(--bg-alt); }
.chapter-item:hover .chapter-title { color: var(--accent); }
.chapter-head { display: grid; grid-template-columns: 64px 1fr 40px; gap: 24px; align-items: center; padding: 24px 20px; }
.chapter-num { font-family: var(--display); font-size: 18px; font-weight: 700; color: var(--accent); line-height: 1; text-align: center; letter-spacing: 0.05em; }
.chapter-title { font-family: var(--display); font-size: 20px; font-weight: 700; line-height: 1.2; margin-bottom: 4px; transition: color 0.2s; letter-spacing: -0.02em; }
.chapter-meta { font-family: var(--sans); font-size: 11px; letter-spacing: 0.15em; color: var(--ink-mute); }
.chapter-toggle { font-size: 28px; color: var(--ink-soft); font-family: var(--serif); font-weight: 300; text-align: center; }
.chapter-body { padding: 0 20px 32px 108px; }
.chapter-drop { font-family: var(--sans); font-size: 14px; line-height: 1.85; color: var(--ink); margin-bottom: 20px; max-width: 640px; letter-spacing: 0.005em; }
.drop-cap { font-size: 44px; font-weight: 400; float: left; line-height: 0.85; margin: 6px 10px 0 0; color: var(--accent); font-family: var(--serif); }
.chapter-actions { display: flex; gap: 20px; padding-top: 12px; border-top: 1px dotted var(--line-strong); max-width: 640px; }
.btn-link { font-family: var(--sans); font-size: 12px; letter-spacing: 0.12em; color: var(--accent); font-weight: 600; }
.btn-link:hover { text-decoration: underline; }
.quotes-list { display: grid; gap: 40px; padding: 20px 0; }
.quote-card { position: relative; padding: 48px 60px; border: 1px solid var(--line); background: var(--bg-alt); text-align: center; }
.quote-num { position: absolute; top: 16px; left: 20px; font-family: var(--mono); font-size: 11px; letter-spacing: 0.2em; color: var(--ink-mute); }
.quote-mark { font-family: var(--serif); font-size: 80px; color: var(--accent); line-height: 0.5; margin-bottom: 12px; opacity: 0.4; }
.quote-text { font-family: var(--display); font-size: 22px; line-height: 1.55; font-weight: 500; margin-bottom: 20px; letter-spacing: -0.01em; }
.quote-attr { font-family: var(--sans); font-size: 12px; letter-spacing: 0.15em; color: var(--ink-soft); }
.about-block { display: grid; grid-template-columns: 200px 1fr; gap: 60px; padding: 20px 0; }
.about-portrait { aspect-ratio: 3/4; display: flex; align-items: center; justify-content: center; flex-direction: column; color: rgba(255,255,255,0.9); font-family: var(--serif); position: relative; }
.about-portrait::before { content: ""; position: absolute; inset: 12px; border: 1px dashed rgba(255,255,255,0.3); }
.portrait-initials { font-family: var(--display); font-size: 60px; font-weight: 800; letter-spacing: 0.05em; }
.portrait-lbl { font-family: var(--mono); font-size: 10px; letter-spacing: 0.25em; margin-top: 12px; opacity: 0.7; }
.about-text h3 { font-family: var(--display); font-size: 28px; font-weight: 800; margin-bottom: 8px; letter-spacing: -0.025em; }
.about-meta { font-family: var(--sans); font-size: 12px; letter-spacing: 0.2em; color: var(--accent); margin-bottom: 20px; }
.about-text p { font-family: var(--sans); font-size: 14px; line-height: 1.85; margin-bottom: 16px; color: var(--ink-soft); }
.about-works { margin-top: 28px; padding-top: 20px; border-top: 1px solid var(--line); }
.works-label { font-family: var(--sans); font-size: 11px; letter-spacing: 0.2em; color: var(--ink-mute); margin-bottom: 10px; }
.about-works ul { list-style: none; font-family: var(--sans); font-size: 13px; }
.about-works li { padding: 6px 0; border-bottom: 1px dotted var(--line); }
.detail-related { max-width: 1200px; margin: 80px auto 40px; padding-top: 40px; border-top: 3px double var(--ink); }
.related-label { font-family: var(--sans); font-size: 11px; letter-spacing: 0.3em; color: var(--accent); font-weight: 700; margin-bottom: 24px; text-align: center; }
.related-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 32px; }

<!-- React + Babel CDN -->
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>

<!-- PDF.js for cover extraction -->
<script>

  document.head.appendChild(s);
  var s2 = document.createElement('script');
  s2.src = 'https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';

<!-- Book data -->

<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

/* ──────────────────────────────────────────
   資料橋接器：將 BOOKS_DATA 格式轉換為設計格式
   ────────────────────────────────────────── */
const CAT_MAP = {
  "投資/財富": "投資 · INVEST",
  "AI/科技":   "科技 · TECH",
  "人性/心理": "心理 · PSYCH",
  "生活/心智": "生活 · LIFE",
  "溝通/談判": "溝通 · COMM",
  "商業/創業": "商業 · BIZ",
  "關係/情緒": "關係 · SOCIAL",
  "其他":      "其他 · OTHER",
};

const CAT_COLORS = {
  "投資/財富": "#7A2E2B",
  "AI/科技":   "#2E4A6B",
  "人性/心理": "#3E5641",
  "生活/心智": "#4A5D3A",
  "溝通/談判": "#8B5A2B",
  "商業/創業": "#5C4A6B",
  "關係/情緒": "#6B4226",
  "其他":      "#4A453E",
};

const COVER_STYLES = ["a","b","c","d","e","f"];
const MAX_UPLOAD_PDF_PAGES = 120;
const MAX_UPLOAD_EPUB_DOCS = 80;

const CH_NUMS = ["壹","貳","參","肆","伍","陸","柒","捌","玖","拾",
                 "拾壹","拾貳","拾參","拾肆","拾伍","拾陸","拾柒","拾捌","拾玖","貳拾"];

function cleanTitle(raw) {
  return (raw || "")
    .split(/\s*[=＝]\s*/)[0]
    .replace(/\.(pdf|epub)$/i, "")
    .trim();
}

function extractSubtitle(raw) {
  const parts = raw.split(/[：:]/);
  return parts.length > 1 ? parts.slice(1).join("：").split(/\s*[=＝]/)[0].trim() : "";
}

function extractQuotes(intro) {
  if (!intro) return ["（尚未收錄金句）"];
  const sents = intro.split(/[。！？]/).filter(s => s.trim().length > 15 && s.trim().length < 120);
  return sents.slice(0, 3).map(s => s.trim()) || ["（尚未收錄金句）"];
}

function simpleHash(str = "") {
  let h = 0;
  for (let i = 0; i < str.length; i++) h = ((h << 5) - h + str.charCodeAt(i)) | 0;
  return Math.abs(h).toString(16);
}

function resolveRepoAssetPath(path) {
  if (!path) return null;
  if (/^https?:\/\//i.test(path) || path.startsWith("data:")) return path;
  const normalized = String(path).replace(/\\/g, "/");
  const idx = normalized.indexOf("/data/");
  if (idx >= 0) return ".." + normalized.slice(idx);
  if (normalized.startsWith("data/")) return "../" + normalized;
  return path;
}

function normalizeWhitespace(text = "") {
  return String(text)
    .replace(/\r/g, "\n")
    .replace(/\u0000/g, "")
    .replace(/[ \t]+/g, " ")
    .replace(/ *\n */g, "\n")
    .trim();
}

function normalizeReadingText(text = "") {
  const rawLines = normalizeWhitespace(text)
    .split("\n")
    .map(line => line.trim())
    .filter(Boolean);

  const paragraphs = [];
  let buffer = "";
  const flush = () => {
    if (!buffer.trim()) return;
    paragraphs.push(buffer.trim());
    buffer = "";
  };

  rawLines.forEach((line) => {
    if (/^[0-9]{1,3}$/.test(line)) return;
    if (/^(第[\d一二三四五六七八九十百千]+[章節回部篇]|Chapter\s+\d+)/i.test(line)) {
      flush();
      paragraphs.push(line);
      return;
    }
    if (!buffer) {
      buffer = line;
      return;
    }
    const appendWithSpace = /[A-Za-z0-9,.;:!?)]$/.test(buffer) && /^[A-Za-z0-9(]/.test(line);
    buffer += appendWithSpace ? ` ${line}` : line;
    if (/[。！？」』】）]$/.test(line) && buffer.length >= 140) flush();
  });
  flush();

  const finalParagraphs = [];
  paragraphs.forEach((para) => {
    if (para.length <= 260) {
      finalParagraphs.push(para);
      return;
    }
    const sentences = para.split(/(?<=[。！？])/).map(s => s.trim()).filter(Boolean);
    if (sentences.length <= 2) {
      finalParagraphs.push(para);
      return;
    }
    let chunk = "";
    sentences.forEach((sentence) => {
      if (!chunk) {
        chunk = sentence;
      } else if ((chunk + sentence).length > 230) {
        finalParagraphs.push(chunk);
        chunk = sentence;
      } else {
        chunk += sentence;
      }
    });
    if (chunk) finalParagraphs.push(chunk);
  });

  return finalParagraphs.filter(Boolean);
}

function buildChaptersFromPageTexts(pageTexts = [], totalPages = 0) {
  const cleanedPages = pageTexts
    .map(t => normalizeReadingText(t).join("\n\n"))
    .filter(Boolean);
  if (!cleanedPages.length) {
    return {
      pages: totalPages || 0,
      summary: "（尚未解析出內容）",
      chapters: [{ num: "壹", title: "第一節", desc: "目前尚未解析出可閱讀內容。", page: 1 }],
      fullReading: ["目前尚未解析出可閱讀內容。"],
      quotes: ["（尚未收錄金句）"],
    };
  }

  const pagesPerChunk = cleanedPages.length > 72 ? 12 : cleanedPages.length > 36 ? 8 : 6;
  const chunks = [];
  for (let i = 0; i < cleanedPages.length; i += pagesPerChunk) {
    const slice = cleanedPages.slice(i, i + pagesPerChunk).join("\n\n");
    if (slice.trim()) {
      chunks.push({
        page: i + 1,
        text: slice.trim(),
      });
    }
  }

  const fullReading = chunks.map(c => c.text);
  const chapters = chunks.slice(0, 20).map((chunk, i) => {
    const firstLine = chunk.text.split("\n")[0].trim();
    const titleGuess = firstLine.length <= 24 && !/[。！？]/.test(firstLine) ? firstLine : `第 ${i + 1} 節`;
    const desc = normalizeReadingText(chunk.text).join("").slice(0, 260);
    return {
      num: CH_NUMS[i] || String(i + 1),
      title: titleGuess,
      desc: desc || "請點進閱讀查看內容。",
      page: chunk.page,
    };
  });

  const summary = normalizeReadingText(fullReading[0] || "").join("").slice(0, 420) || "（尚未填寫簡介）";
  return {
    pages: totalPages || cleanedPages.length,
    summary,
    chapters: chapters.length ? chapters : [{ num: "壹", title: "第一節", desc: summary, page: 1 }],
    fullReading,
    quotes: extractQuotes(summary),
  };
}

async function waitForLibrary(checkFn, timeout = 8000, step = 120) {
  const started = Date.now();
  while (Date.now() - started < timeout) {
    const value = checkFn();
    if (value) return value;
    await new Promise(r => setTimeout(r, step));
  }
  throw new Error("外部解析模組載入逾時，請重新整理後再試一次。");
}

async function extractPdfText(file) {
  const pdfjs = await waitForLibrary(() => window.pdfjsLib);
  const arrayBuffer = await file.arrayBuffer();
  const pdf = await pdfjs.getDocument({ data: arrayBuffer }).promise;
  const pageTexts = [];
  const limit = Math.min(pdf.numPages, MAX_UPLOAD_PDF_PAGES);
  for (let i = 1; i <= limit; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    const lines = content.items.map(item => item.str).join(" ");
    pageTexts.push(lines);
  }
  return { totalPages: pdf.numPages, pageTexts };
}

function stripHtmlToText(html = "") {
  const div = document.createElement("div");
  div.innerHTML = html;
  return normalizeWhitespace(div.textContent || div.innerText || "");
}

async function extractEpubText(file) {
  const JSZipLib = await waitForLibrary(() => window.JSZip);
  const zip = await JSZipLib.loadAsync(file);
  const htmlFiles = Object.keys(zip.files)
    .filter(name => /\.(xhtml|html|htm)$/i.test(name) && !/__MACOSX/.test(name))
    .sort()
    .slice(0, MAX_UPLOAD_EPUB_DOCS);
  const pageTexts = [];
  for (const name of htmlFiles) {
    const html = await zip.file(name).async("string");
    const text = stripHtmlToText(html);
    if (text.length > 30) pageTexts.push(text);
  }
  return { totalPages: pageTexts.length, pageTexts };
}

function mergeBooksById(...groups) {
  const map = new Map();
  groups.flat().filter(Boolean).forEach((book) => {
    if (!book || !book.id) return;
    const existing = map.get(book.id) || {};
    map.set(book.id, { ...existing, ...book });
  });
  return [...map.values()];
}

async function extractPdfCover(file) {
  const arrayBuffer = await file.arrayBuffer();
  const pdf = await window.pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  const page = await pdf.getPage(1);
  const viewport = page.getViewport({ scale: 2 });
  const canvas = document.createElement("canvas");
  canvas.width = viewport.width;
  canvas.height = viewport.height;
  await page.render({ canvasContext: canvas.getContext("2d"), viewport }).promise;
  return canvas.toDataURL("image/jpeg", 0.85);
}

async function extractEpubCover(file) {
  const zip = await window.JSZip.loadAsync(file);
  const candidates = Object.keys(zip.files).filter(n => /cover/i.test(n) && /\.(jpe?g|png|gif|webp)$/i.test(n));
  let coverFile = candidates[0];
  if (!coverFile) {
    const opfPath = Object.keys(zip.files).find(n => n.endsWith(".opf"));
    if (opfPath) {
      const opf = await zip.file(opfPath).async("string");
      const match = opf.match(/<item[^>]*id="cover[^"]*"[^>]*href="([^"]+)"/i)
                 || opf.match(/<meta[^>]*name="cover"[^>]*content="([^"]+)"/i);
      if (match) {
        const base = opfPath.substring(0, opfPath.lastIndexOf("/") + 1);
        coverFile = Object.keys(zip.files).find(n => n.endsWith(match[1]) || n === base + match[1]);
      }
    }
  }
  if (!coverFile) coverFile = Object.keys(zip.files).find(n => /\.(jpe?g|png)$/i.test(n));
  if (!coverFile) return null;
  const blob = await zip.file(coverFile).async("blob");
  return await new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = rej;
    r.readAsDataURL(blob);
  });
}

function UploadModal({ onClose, onAdd }) {
  const [stage, setStage] = useState("drop");
  const [cover, setCover] = useState(null);
  const [processing, setProcessing] = useState(false);
  const [uploadResult, setUploadResult] = useState(null);
  const [form, setForm] = useState({
    title: "", subtitle: "", author: "", year: "", category: "其他 · OTHER",
    summary: "", tags: "", color: "#7A2E2B"
  });
  const fileRef = useRef();

  const handleFile = async (file) => {
    if (!file) return;
    setProcessing(true);
    setStage("processing");
    try {
      let coverData = null;
      let textResult = { totalPages: 0, pageTexts: [] };
      const name = file.name.toLowerCase();
      if (name.endsWith(".pdf")) {
        await waitForLibrary(() => window.pdfjsLib);
        coverData = await extractPdfCover(file);
        textResult = await extractPdfText(file);
      } else if (name.endsWith(".epub")) {
        await waitForLibrary(() => window.JSZip);
        coverData = await extractEpubCover(file);
        textResult = await extractEpubText(file);
      } else if (/\.(jpe?g|png|gif|webp)$/i.test(name)) {
        coverData = await new Promise((res, rej) => {
          const r = new FileReader(); r.onload = () => res(r.result); r.onerror = rej; r.readAsDataURL(file);
        });
      } else {
        alert("請上傳 PDF、EPUB 或圖片檔");
        setStage("drop"); setProcessing(false); return;
      }
      setCover(coverData);
      const baseName = file.name.replace(/\.(pdf|epub|jpe?g|png|gif|webp)$/i, "");
      const parsed = buildChaptersFromPageTexts(textResult.pageTexts || [], textResult.totalPages || 0);
      setUploadResult(parsed);
      setForm(f => ({ ...f, title: f.title || cleanTitle(baseName) }));
      setForm(f => ({ ...f, summary: f.summary || parsed.summary || "" }));
      setStage("form");
    } catch (err) {
      console.error(err);
      alert("處理檔案失敗: " + err.message);
      setStage("drop");
    } finally {
      setProcessing(false);
    }
  };

  const submit = () => {
    if (!form.title.trim()) { alert("請輸入書名"); return; }
    const newBook = {
      id: "user_" + Date.now(),
      issue: `No. ${String(Date.now()).slice(-2)}`,

      color: form.color,
      coverStyle: "a",
      coverImage: cover,
      summary: form.summary || uploadResult?.summary || "（尚未填寫簡介）",
      chapters: uploadResult?.chapters || [
        { num: "壹", title: "第一章", desc: "請編輯此章節的內容摘要。", page: 1 },
        { num: "貳", title: "第二章", desc: "請編輯此章節的內容摘要。", page: 2 }
      ],
      fullReading: uploadResult?.fullReading || null,
      pages: uploadResult?.pages || 200,
      readTime: `約 ${Math.max(1, Math.round((uploadResult?.pages || 200) / 60))} 小時`,
      quotes: uploadResult?.quotes || ["（尚未收錄金句）"],
      userAdded: true,
      rawStatus: "待讀",
    };
    onAdd(newBook);
    onClose();
  };

  return (
    <div className="upload-overlay" onClick={onClose}>
      <div className="upload-modal" onClick={e => e.stopPropagation()}>
        <header className="upload-head">
          <div>
            <div className="upload-kicker">ADD TO SHELF</div>

        {stage === "drop" && (
          <div className="upload-body">
            <div className="upload-drop" onDragOver={e => e.preventDefault()}
              onDrop={e => { e.preventDefault(); handleFile(e.dataTransfer.files[0]); }}
              onClick={() => fileRef.current.click()}>

   Bookshelf 書架頁
   ────────────────────────────────────────── */
function Bookshelf({ books, onOpenBook, onBackToCover, onAddBook, onDeleteBook, bookmarks }) {
  const [filter, setFilter] = useState("全部");
  const [search, setSearch] = useState("");
  const [showUpload, setShowUpload] = useState(false);

  const rawCats = [...new Set(books.map(b => b.rawCategory))].sort();
  const categories = ["全部", "★ 書籤", ...rawCats];

  const filtered = useMemo(() => {
    let list = filter === "全部" ? books
             : filter === "★ 書籤" ? books.filter(b => bookmarks.includes(b.id))
             : books.filter(b => b.rawCategory === filter);
    if (search.trim()) {
      const q = search.trim().toLowerCase();
      list = list.filter(b => b.title.toLowerCase().includes(q) || b.author.toLowerCase().includes(q) || b.summary.toLowerCase().includes(q));
    }
    return list;
  }, [books, filter, search, bookmarks]);

  return (
    <div className="bookshelf-page">
      <header className="shelf-header">
        <button className="shelf-back" onClick={onBackToCover}>← 回封面</button>
        <div className="shelf-title-block">
          <div className="shelf-kicker">CATALOGUE · 目錄</div>
          <h2 className="shelf-title">個人書庫</h2>
          <div className="shelf-sub">{books.length} books · 知識藏書全覽</div>
        </div>
        <div className="shelf-toolbar">
          <div style={{ display: "flex", gap: "8px", alignItems: "center", flex: 1, flexWrap: "wrap" }}>
            <div style={{ position: "relative", flexShrink: 0 }}>
              <input
                value={search}
                onChange={e => setSearch(e.target.value)}
                placeholder="搜尋書名、作者…"
                style={{
                  fontFamily: "var(--sans)", fontSize: "12px", padding: "8px 12px 8px 32px",
                  border: "1px solid var(--line-strong)", background: "var(--bg)", color: "var(--ink)",
                  width: "200px", outline: "none"
                }}
                onFocus={e => e.target.style.borderColor = "var(--accent)"}
                onBlur={e => e.target.style.borderColor = "var(--line-strong)"}
              />
              <span style={{ position: "absolute", left: "10px", top: "50%", transform: "translateY(-50%)", fontSize: "13px", color: "var(--ink-mute)" }}>🔍</span>
            </div>
            <div className="shelf-filters">
              {categories.map(c => (
                <button key={c} className={`filter-chip ${filter === c ? "active" : ""}`} onClick={() => setFilter(c)}>{c}</button>
              ))}
            </div>
          </div>
          <button className="shelf-add" onClick={() => setShowUpload(true)}>
            <span className="add-plus">＋</span> 新增書籍
          </button>
        </div>
      </header>

      <div className="shelf-grid">
        {filtered.map((b, i) => (
          <BookCard key={b.id} book={b} index={i} onOpen={() => onOpenBook(b.id)}
            onDelete={b.userAdded ? () => { if (confirm(`刪除《${b.title}》?`)) onDeleteBook(b.id); } : null}
          />
        ))}
        <button className="shelf-add-card" onClick={() => setShowUpload(true)}>
          <div className="add-card-icon">＋</div>
          <div className="add-card-title">新增書籍</div>
          <div className="add-card-sub">拖放 PDF · EPUB · 圖片<br/>自動抽取封面</div>
        </button>
      </div>

      {showUpload && <UploadModal onClose={() => setShowUpload(false)} onAdd={onAddBook} />}

      <footer className="shelf-footer">
        <div>JIM'S BOOK COLLECTION · {books.length} 本藏書</div>
        <div>2026 · 個人書庫</div>
      </footer>
    </div>
  );
}

/* ──────────────────────────────────────────
   自動抽取重點（不需要 API）
   ────────────────────────────────────────── */
function extractKeyPoints(text) {
  if (!text || text.length < 20) return [];
  const sentences = text
    .split(/[。！？\n]/)
    .map(s => s.trim())
    .filter(s => s.length > 20 && s.length < 200);
  // 取前 4 句作為重點
  return sentences.slice(0, 4);
}

function autoSummary(text) {
  if (!text || text.length < 30) return "（此章節暫無摘錄內容）";
  const pts = extractKeyPoints(text);
  return pts.length ? pts.join("。\n") + "。" : text.slice(0, 200) + "…";
}

function getFullReading(book, chapterIndex, fallback) {
  if (book?.fullReading?.[chapterIndex]) return book.fullReading[chapterIndex];
  if (!window.FULL_READING || !window.FULL_READING[book.id]) return fallback || "";
  return window.FULL_READING[book.id][chapterIndex] || fallback || "";
}

function isFrontMatter(title = "") {
  return /目次|目录|前言|引言|推薦序|推荐序|序章|版权|版權|扉页|封面|出版|作者簡介/i.test(title);
}

function getBestStartChapter(book) {
  const chapters = book.chapters || [];
  for (let i = 0; i < chapters.length; i++) {
    const ch = chapters[i];
    const full = getFullReading(book, i, ch.desc || "");
    if (!isFrontMatter(ch.title || "") && (full.length >= 1200 || (ch.desc || "").length >= 800)) {
      return i;
    }
  }
  for (let i = 0; i < chapters.length; i++) {
    const ch = chapters[i];
    const full = getFullReading(book, i, ch.desc || "");
    if (full.length >= 800 || (ch.desc || "").length >= 500) return i;
  }
  return 0;
}

/* ──────────────────────────────────────────
   ReadingModal 閱讀全章 Modal
   ────────────────────────────────────────── */
function ReadingModal({ book, chapter, chapterIndex, onClose, onPrev, onNext }) {
  const [showSummary, setShowSummary] = useState(false);

  const keyPoints = extractKeyPoints(chapter.desc);
  const summary = autoSummary(chapter.desc);

  // 預先生成內容（如有 window.AI_CONTENT）
  const preGenerated = window.AI_CONTENT && window.AI_CONTENT[book.id]
    ? window.AI_CONTENT[book.id][chapterIndex] || null : null;
  const fullReading = getFullReading(book, chapterIndex, chapter.desc);
  const readingParagraphs = normalizeReadingText(fullReading || chapter.desc || "");

  return (
    <div className="reading-overlay">
      <div className="reading-inner">
        <div className="reading-top">
          <span>《{book.title}》· {chapter.num}</span>
          <button className="reading-close" onClick={onClose}>×</button>
        </div>
        <div className="reading-ch-num">{chapter.num} · {chapter.page ? `P. ${chapter.page}` : ""}</div>
        <div className="reading-ch-title">{chapter.title}</div>
        <div className="reading-body">
          {readingParagraphs.map((para, idx) => (
            <p key={idx} className={`reading-paragraph ${idx === 0 ? "drop-paragraph" : ""}`}>
              {idx === 0
                ? <><span className="drop">{para.charAt(0)}</span>{para.slice(1)}</>
                : para}
            </p>
          ))}
        </div>

        {book.pageImages && book.pageImages.length > 0 && (
          <div className="image-gallery">
            <div className="image-gallery-label">書中圖片 · Page Images</div>
            <div className="image-gallery-grid">
              {book.pageImages.slice(0, 8).map((src, idx) => (
                <img key={idx} src={src} alt={`${book.title} 內頁 ${idx + 1}`} loading="lazy" />
              ))}
            </div>
          </div>
        )}

        {/* 重點整理（免費，自動抽取）*/}
        {keyPoints.length > 0 && (
          <div className="ai-panel" style={{ marginTop: "40px" }}>
            <div className="ai-panel-head">
              <div className="ai-label">✦ 重點整理（自動抽取）</div>
              <button className="ai-btn" onClick={() => setShowSummary(s => !s)}>
                {showSummary ? "收起" : "展開"}
              </button>
            </div>
            {showSummary && (
              <div className="ai-result">
                {keyPoints.map((p, i) => (
                  <div key={i} style={{ marginBottom: "10px", paddingLeft: "14px", borderLeft: "2px solid var(--accent)" }}>
                    {p}。
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {/* 預先生成內容（如有執行過 generate_ai_content.py）*/}
        {preGenerated && (
          <div className="ai-panel" style={{ marginTop: "16px" }}>
            <div className="ai-label" style={{ marginBottom: "12px" }}>✦ AI 精讀筆記（預先生成）</div>
            <div className="ai-result">{preGenerated}</div>
          </div>
        )}

        <div className="reading-footer">
          <button className="btn-link" onClick={onPrev} disabled={chapterIndex === 0} style={{ opacity: chapterIndex === 0 ? 0.3 : 1 }}>← 上一章</button>
          <span>第 {chapterIndex + 1} 章 / 共 {book.chapters.length} 章</span>
          <button className="btn-link" onClick={onNext} disabled={chapterIndex >= book.chapters.length - 1} style={{ opacity: chapterIndex >= book.chapters.length - 1 ? 0.3 : 1 }}>下一章 →</button>
        </div>
      </div>
    </div>
  );
}

/* ──────────────────────────────────────────
   BookDetail 書籍詳情頁
   ────────────────────────────────────────── */
function BookDetail({ book, books, onBack, onOpenBook, bookmarks, onToggleBookmark, onUpdateBook, onRemoveBook }) {
  const [tab, setTab] = useState("chapters");
  const [openChapter, setOpenChapter] = useState(0);
  const [readingChapter, setReadingChapter] = useState(null);
  const [showEdit, setShowEdit] = useState(false);
  const isBookmarked = bookmarks.includes(book.id);
  const others = books.filter(b => b.id !== book.id && b.rawCategory === book.rawCategory).slice(0, 3);

  return (
    <div className="detail-page">
      {showEdit && (
        <EditBookModal
          book={book}
          onClose={() => setShowEdit(false)}
          onSave={(patch) => { onUpdateBook(book.id, patch); setShowEdit(false); }}
          onRemove={() => { setShowEdit(false); onRemoveBook(book.id); }}
        />
      )}
      {readingChapter !== null && (
        <ReadingModal
          book={book}
          chapter={book.chapters[readingChapter]}
          chapterIndex={readingChapter}
          onClose={() => setReadingChapter(null)}
          onPrev={() => setReadingChapter((n) => Math.max(0, n - 1))}
          onNext={() => setReadingChapter((n) => Math.min(book.chapters.length - 1, n + 1))}
        />
      )}

      <header className="detail-header">
        <button className="detail-back" onClick={onBack}>← 回書架</button>
        <div className="detail-crumb">書庫 / {book.category} / {book.title}</div>
        <div className="detail-issue">{book.issue}</div>
      </header>

      <section className="detail-hero">
        <div className="hero-cover" style={{ background: book.color }}>
          <BookCoverArt book={book} />
        </div>
        <div className="hero-info">
          <div className="hero-category">{book.category}</div>
          <h1 className="hero-title">{book.title}</h1>
          {book.subtitle && <div className="hero-subtitle">{book.subtitle}</div>}
          <div className="hero-byline">
            <span className="byline-author">{book.author}</span>
            {book.year && <><span className="byline-sep">·</span><span>{book.year}</span></>}
            <span className="byline-sep">·</span>
            <span className={`status-badge ${book.rawStatus === "在讀" ? "status-reading" : book.rawStatus === "已讀" ? "status-done" : "status-pending"}`}>
              {book.rawStatus}
            </span>
          </div>
          <div className="hero-stats">
            <div><div className="stat-num">{book.pages || "—"}</div><div className="stat-lbl">頁數</div></div>
            <div><div className="stat-num">{book.chapters.length}</div><div className="stat-lbl">章節</div></div>
            <div><div className="stat-num">{book.readTime.replace("約 ", "").replace(" 小時", "h")}</div><div className="stat-lbl">閱讀</div></div>
            <div><div className="stat-num">{book.quotes.length}</div><div className="stat-lbl">摘句</div></div>
          </div>
          <div className="hero-actions">
            <button className="btn-primary" onClick={() => setReadingChapter(getBestStartChapter(book))}>開始閱讀</button>
            <button
              className={`bookmark-btn ${isBookmarked ? "active" : ""}`}
              onClick={() => onToggleBookmark(book.id)}
            >
              {isBookmarked ? "★ 已加書籤" : "☆ 加入書籤"}
            </button>
            <button className="btn-ghost" onClick={() => setShowEdit(true)}>編輯 / 刪除</button>
          </div>
          <div className="hero-tags">
            {book.tags.map(t => <span key={t} className="hero-tag">{t}</span>)}
          </div>
        </div>
      </section>

      <section className="detail-lead">
        <div className="lead-label">內容導讀 · EDITOR'S NOTE</div>
        <p className="lead-text">{book.summary}</p>
        <div className="lead-sig">— Jim 書庫</div>
      </section>

      {book.pageImages && book.pageImages.length > 0 && (
        <section className="image-gallery">
          <div className="image-gallery-label">書內圖像頁 · Visual Pages</div>
          <div className="image-gallery-grid">
            {book.pageImages.slice(0, 8).map((src, idx) => (
              <img key={idx} src={src} alt={`${book.title} 第 ${idx + 1} 張頁面圖`} loading="lazy" />
            ))}

        </section>

      <nav className="detail-tabs">

          { id: "chapters", lbl: "章節目錄" },
          { id: "quotes", lbl: "摘句精選" },

          <div className="about-block">
            <div className="about-portrait" style={{ background: book.color }}>
              <div className="portrait-initials">{(book.author || "書").slice(-1)}</div>

            <div className="about-text">

              <div className="about-meta">{book.rawCategory} · {book.year || "現代"}</div>

      {others.length > 0 && (
        <section className="detail-related">

      <footer className="detail-footer">
        <div>Jim 書庫 · {book.category}</div>
        <div>{book.issue} / {books.length} 本</div>
      </footer>
    </div>
  );
}

/* ──────────────────────────────────────────
   App 主元件
   ────────────────────────────────────────── */
function App() {
  const [view, setView] = useState("cover");
  const [activeBookId, setActiveBookId] = useState(null);
  const [userBooks, setUserBooks] = useState(() => {
    try { return JSON.parse(localStorage.getItem("user_books") || "[]"); }
    catch { return []; }
  });
  const [bookmarks, setBookmarks] = useState(() => {
    try { return JSON.parse(localStorage.getItem("bookmarks") || "[]"); }
    catch { return []; }
  });
  const [bookOverrides, setBookOverrides] = useState(() => {
    try { return JSON.parse(localStorage.getItem("book_overrides") || "{}"); }
    catch { return {}; }
  });
  const [hiddenBookIds, setHiddenBookIds] = useState(() => {
    try { return JSON.parse(localStorage.getItem("hidden_books") || "[]"); }
    catch { return []; }
  });
  const sourceBooks = useMemo(() =>
    ((window.LIBRARY_MANIFEST && window.LIBRARY_MANIFEST.length ? window.LIBRARY_MANIFEST : window.BOOKS_DATA) || []).map((b, i) => adaptBook(b, i)),
  []);

  const allBooks = useMemo(() => {
    const merged = mergeBooksById(sourceBooks, userBooks).map((book) => {
      const override = bookOverrides[book.id] || {};
      const next = { ...book, ...override };
      if (override.rawCategory) {
        next.rawCategory = override.rawCategory;
        next.category = CAT_MAP[override.rawCategory] || `${override.rawCategory} · OTHER`;
      }
      if (override.tags) next.tags = override.tags;
      if (override.summary) next.summary = override.summary;
      if (override.rawStatus) next.rawStatus = override.rawStatus;
      return next;
    });
    return merged.filter((book) => !hiddenBookIds.includes(book.id));
  }, [sourceBooks, userBooks, bookOverrides, hiddenBookIds]);

  const addBook = (book) => {
    const updated = [...userBooks, book];
    setUserBooks(updated);
    localStorage.setItem("user_books", JSON.stringify(updated));
  };

  const deleteBook = (id) => {
    const updated = userBooks.filter(b => b.id !== id);
    setUserBooks(updated);
    localStorage.setItem("user_books", JSON.stringify(updated));
  };

  const updateBook = (id, patch) => {
    const isUserBook = userBooks.some((b) => b.id === id);
    if (isUserBook) {
      const updated = userBooks.map((b) => b.id === id ? { ...b, ...patch, category: patch.rawCategory || b.rawCategory || b.category } : b);
      setUserBooks(updated);
      localStorage.setItem("user_books", JSON.stringify(updated));
      return;
    }
    const updated = { ...bookOverrides, [id]: { ...(bookOverrides[id] || {}), ...patch } };
    setBookOverrides(updated);
    localStorage.setItem("book_overrides", JSON.stringify(updated));
  };

  const removeFromPanel = (id) => {
    const isUserBook = userBooks.some((b) => b.id === id);
    if (isUserBook) {
      deleteBook(id);
      return;
    }
    const updated = [...new Set([...hiddenBookIds, id])];
    setHiddenBookIds(updated);
    localStorage.setItem("hidden_books", JSON.stringify(updated));
    if (activeBookId === id) {
      setView("shelf");
      setActiveBookId(null);
    }
  };

  const toggleBookmark = (id) => {
    const updated = bookmarks.includes(id) ? bookmarks.filter(x => x !== id) : [...bookmarks, id];
    setBookmarks(updated);
    localStorage.setItem("bookmarks", JSON.stringify(updated));
  };

  const openBook = (id) => {
    setActiveBookId(id);
    setView("detail");
    window.scrollTo(0, 0);
  };

  const activeBook = allBooks.find(b => b.id === activeBookId);

  return (
    <div className="app-shell">
      {view === "cover" && (
        <MagazineCover books={allBooks} onEnter={() => setView("shelf")} onOpenBook={openBook} />
      )}
      {view === "shelf" && (
        <Bookshelf books={allBooks} onOpenBook={openBook} bookmarks={bookmarks}
          onBackToCover={() => setView("cover")} onAddBook={addBook} onDeleteBook={deleteBook} />
      )}
      {view === "detail" && activeBook && (
        <BookDetail
          book={activeBook} books={allBooks}
          onBack={() => setView("shelf")} onOpenBook={openBook}
          bookmarks={bookmarks} onToggleBookmark={toggleBookmark}
          onUpdateBook={updateBook}
          onRemoveBook={removeFromPanel}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
